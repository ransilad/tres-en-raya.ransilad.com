<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tic-Tac-Toe Immersive Board</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#ff97a3",
                    "primary": "#8aebff",
                    "outline-variant": "#3c494c",
                    "surface-container": "#171f33",
                    "surface-container-highest": "#2d3449",
                    "error": "#ffb4ab",
                    "secondary-container": "#891933",
                    "primary-container": "#22d3ee",
                    "secondary-fixed": "#ffdadc",
                    "surface-container-lowest": "#060e20",
                    "inverse-primary": "#006877",
                    "background": "#0b1326",
                    "inverse-on-surface": "#283044",
                    "surface-variant": "#2d3449",
                    "on-tertiary-fixed-variant": "#3c475a",
                    "on-secondary-fixed-variant": "#891933",
                    "on-surface": "#dae2fd",
                    "primary-fixed": "#a2eeff",
                    "on-tertiary-container": "#444f63",
                    "on-background": "#dae2fd",
                    "on-error": "#690005",
                    "on-surface-variant": "#bbc9cd",
                    "on-error-container": "#ffdad6",
                    "surface-tint": "#2fd9f4",
                    "surface-container-low": "#131b2e",
                    "on-primary-fixed": "#001f25",
                    "on-secondary-fixed": "#400010",
                    "on-tertiary": "#263143",
                    "on-primary": "#00363e",
                    "surface": "#0b1326",
                    "on-primary-fixed-variant": "#004e5a",
                    "inverse-surface": "#dae2fd",
                    "secondary": "#ffb2b9",
                    "tertiary-fixed-dim": "#bcc7de",
                    "on-tertiary-fixed": "#111c2d",
                    "tertiary-fixed": "#d8e3fb",
                    "surface-bright": "#31394d",
                    "on-secondary": "#67001f",
                    "tertiary-container": "#b6c1d9",
                    "secondary-fixed-dim": "#ffb2b9",
                    "outline": "#859397",
                    "error-container": "#93000a",
                    "tertiary": "#d2ddf5",
                    "on-primary-container": "#005763",
                    "surface-container-high": "#222a3d",
                    "surface-dim": "#0b1326",
                    "primary-fixed-dim": "#2fd9f4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap-sm": "8px",
                    "grid-gap": "12px",
                    "container-padding": "24px",
                    "stack-gap-md": "16px",
                    "stack-gap-lg": "32px"
            },
            "fontFamily": {
                    "body-lg": ["Outfit"],
                    "headline-lg": ["Outfit"],
                    "headline-md": ["Outfit"],
                    "label-caps": ["Outfit"],
                    "body-md": ["Outfit"],
                    "stat-value": ["Outfit"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "stat-value": ["28px", {"lineHeight": "1", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        body {
            background-color: #0b1326; /* Fixed deep charcoal canvas */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-on-surface min-h-screen flex flex-col items-center justify-between py-stack-gap-lg px-container-padding">
<!-- Turn Indicator Zone -->
<header class="w-full flex flex-col items-center gap-stack-gap-sm mt-stack-gap-lg">
<div class="flex items-center gap-stack-gap-md">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">
                radio_button_checked
            </span>
<h1 class="font-headline-md text-headline-md tracking-widest text-primary uppercase">
                VIKRAM'S TURN
            </h1>
</div>
<div class="h-1 w-12 bg-primary rounded-full opacity-50"></div>
</header>
<!-- Main Content Canvas (3x3 Grid) -->
<main class="w-full max-w-md aspect-square grid grid-cols-3 gap-grid-gap">
<!-- Row 1 -->
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 0; font-weight: 300;">
                close
            </span>
</div>
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<!-- Empty Tile -->
</div>
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-secondary text-[64px]" style="font-variation-settings: 'FILL' 0; font-weight: 300;">
                radio_button_unchecked
            </span>
</div>
<!-- Row 2 -->
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-secondary text-[64px]" style="font-variation-settings: 'FILL' 0; font-weight: 300;">
                radio_button_unchecked
            </span>
</div>
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 0; font-weight: 300;">
                close
            </span>
</div>
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<!-- Empty Tile -->
</div>
<!-- Row 3 -->
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<!-- Empty Tile -->
</div>
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<!-- Empty Tile -->
</div>
<div class="bg-surface-container rounded-xl flex items-center justify-center shadow-sm active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 0; font-weight: 300;">
                close
            </span>
</div>
</main>
<!-- Stats & Action Zone -->
<footer class="w-full max-w-md flex flex-col gap-stack-gap-lg mb-stack-gap-lg">
<!-- Score Blocks -->
<div class="flex justify-between items-center gap-container-padding">
<!-- Player 1 Stat -->
<div class="flex-1 bg-surface-container-low py-stack-gap-md px-stack-gap-md rounded-xl flex flex-col items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-2">VIKRAM (X)</span>
<span class="font-stat-value text-stat-value text-primary">12</span>
</div>
<!-- Divider -->
<div class="flex flex-col items-center opacity-30">
<span class="font-label-caps text-label-caps text-outline">VS</span>
</div>
<!-- Player 2 Stat -->
<div class="flex-1 bg-surface-container-low py-stack-gap-md px-stack-gap-md rounded-xl flex flex-col items-center border-b-2 border-secondary-container">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-2">OPPONENT (O)</span>
<span class="font-stat-value text-stat-value text-secondary">08</span>
</div>
</div>
<!-- Primary Actions -->
<div class="flex justify-center items-center gap-stack-gap-md">
<button class="bg-primary text-on-primary-fixed w-14 h-14 rounded-full flex items-center justify-center shadow-[0px_20px_40px_-10px_rgba(138,235,255,0.3)] active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[28px]">refresh</span>
</button>
</div>
</footer>
<!-- Subtle Ambient Background Decor (Non-image, CSS only) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[40%] bg-primary opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary opacity-[0.03] blur-[120px] rounded-full"></div>
</div>
</body></html>
